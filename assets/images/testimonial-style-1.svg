<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <rect width="320" height="180" fill="#0A1E3F"/>

  <!-- Decorative quote watermark -->
  <text x="10" y="120" font-family="Georgia,serif" font-size="140" fill="rgba(255,255,255,0.04)" dominant-baseline="auto">"</text>

  <!-- Card 1 -->
  <rect x="16" y="24" width="136" height="132" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
  <text x="28" y="50" font-family="serif" font-size="16" fill="#CF9776">"</text>
  <!-- Stars -->
  <text x="28" y="66" font-family="sans-serif" font-size="10" fill="#fbbf24">★★★★★</text>
  <!-- Text lines -->
  <rect x="28" y="74" width="110" height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="28" y="84" width="90"  height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="28" y="94" width="100" height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <!-- Divider -->
  <line x1="28" y1="112" x2="138" y2="112" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Avatar -->
  <circle cx="44" cy="130" r="12" fill="#CF9776"/>
  <text x="39" y="135" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">R</text>
  <!-- Name + role lines -->
  <rect x="62" y="123" width="66" height="5" rx="2.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="62" y="133" width="50" height="4" rx="2"   fill="rgba(255,255,255,0.4)"/>

  <!-- Card 2 -->
  <rect x="168" y="24" width="136" height="132" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
  <text x="180" y="50" font-family="serif" font-size="16" fill="#CF9776">"</text>
  <text x="180" y="66" font-family="sans-serif" font-size="10" fill="#fbbf24">★★★★★</text>
  <rect x="180" y="74" width="108" height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="180" y="84" width="85"  height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="180" y="94" width="95"  height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <line x1="180" y1="112" x2="290" y2="112" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="196" cy="130" r="12" fill="#CF9776"/>
  <text x="191" y="135" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">L</text>
  <rect x="214" y="123" width="66" height="5" rx="2.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="214" y="133" width="50" height="4" rx="2"   fill="rgba(255,255,255,0.4)"/>

  <!-- Pagination dots -->
  <circle cx="143" cy="168" r="3.5" fill="#CF9776"/>
  <rect   x="150" y="165.5" width="10" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="165" cy="168" r="3.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="173" cy="168" r="3.5" fill="rgba(255,255,255,0.3)"/>

  <!-- Label -->
  <text x="160" y="12" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle">Style 1 — Dark Glass Cards</text>
</svg>
