<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <rect width="320" height="180" fill="#faf9f7"/>

  <!-- Single centred card with left accent border -->
  <rect x="40" y="24" width="240" height="132" rx="0 8 8 0" fill="#fff" stroke="#e8ecf0" stroke-width="1"/>
  <rect x="40" y="24" width="4"   height="132" rx="0" fill="#CF9776"/>

  <!-- Stars -->
  <text x="56" y="52" font-family="sans-serif" font-size="11" fill="#fbbf24">★★★★★</text>

  <!-- Text lines -->
  <rect x="56" y="64"  width="208" height="6" rx="3" fill="#2d3748" opacity="0.22"/>
  <rect x="56" y="76"  width="180" height="6" rx="3" fill="#2d3748" opacity="0.22"/>
  <rect x="56" y="88"  width="196" height="6" rx="3" fill="#2d3748" opacity="0.22"/>
  <rect x="56" y="100" width="140" height="6" rx="3" fill="#2d3748" opacity="0.22"/>

  <!-- Author -->
  <circle cx="72"  cy="128" r="13" fill="#CF9776"/>
  <text x="67" y="133" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">R</text>
  <rect x="92" y="121" width="80" height="6" rx="3" fill="#0A1E3F" opacity="0.8"/>
  <rect x="92" y="133" width="60" height="5" rx="2.5" fill="#718096" opacity="0.6"/>

  <!-- Nav arrows -->
  <text x="18"  y="96" font-family="sans-serif" font-size="18" fill="#0A1E3F" opacity="0.45">‹</text>
  <text x="290" y="96" font-family="sans-serif" font-size="18" fill="#0A1E3F" opacity="0.45">›</text>

  <!-- Label -->
  <text x="160" y="12" font-family="sans-serif" font-size="9" fill="#718096" text-anchor="middle">Style 3 — Minimal</text>
</svg>
